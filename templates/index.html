<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>snip — url shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #c8f135;
      --accent-dim: #9db82a;
      --text: #f0f0f0;
      --muted: #555555;
      --error: #ff4d4d;
      --radius: 6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── header ── */
    header {
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.04em;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    .tagline {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 3rem;
    }

    .hero-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 0.95;
      text-align: center;
      letter-spacing: -0.04em;
      animation: fadeUp 0.6s ease both;
    }

    .hero-title .highlight {
      color: var(--accent);
      display: block;
    }

    /* ── input card ── */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
    }

    .url-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.875rem;
      padding: 0.875rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input::placeholder { color: var(--muted); }

    .url-input:focus {
      border-color: var(--accent);
    }

    .btn {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.875rem;
      letter-spacing: 0.02em;
      padding: 0.875rem 1.5rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { background: #d4f54a; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

    /* ── result ── */
    .result {
      margin-top: 1.25rem;
      display: none;
      flex-direction: column;
      gap: 0.5rem;
    }

    .result.visible { display: flex; }

    .result-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
    }

    .result-url {
      flex: 1;
      color: var(--accent);
      font-size: 0.9rem;
      word-break: break-all;
      text-decoration: none;
    }

    .result-url:hover { text-decoration: underline; }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

    /* ── error ── */
    .error-msg {
      display: none;
      margin-top: 1rem;
      color: var(--error);
      font-size: 0.8rem;
    }
    .error-msg.visible { display: block; }

    /* ── stats panel ── */
    .stats-section {
      width: 100%;
      max-width: 680px;
      animation: fadeUp 0.6s 0.25s ease both;
    }

    .stats-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
      width: 100%;
      text-align: left;
    }

    .stats-toggle:hover { color: var(--text); border-color: var(--muted); }

    .stats-card {
      display: none;
      margin-top: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      gap: 1rem;
      flex-direction: column;
    }

    .stats-card.visible { display: flex; }

    .stats-input-row {
      display: flex;
      gap: 0.75rem;
    }

    .stats-result {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }

    .stats-result.visible { display: flex; }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    .stat-box-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .stat-box-value {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--accent);
    }

    .stat-box-value.small {
      font-size: 0.85rem;
      color: var(--text);
      word-break: break-all;
    }

    /* ── footer ── */
    footer {
      padding: 1.5rem 3rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── loading spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #0a0a0a;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      header { padding: 1.25rem 1.5rem; }
      .hero { padding: 2.5rem 1.25rem; gap: 2rem; }
      .card { padding: 1.25rem; }
      .input-row { flex-direction: column; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">snip<span>.</span></div>
    <div class="tagline">url shortener</div>
  </header>

  <main class="hero">

    <h1 class="hero-title">
      long urls,<br>
      <span class="highlight">cut short.</span>
    </h1>

    <!-- shorten card -->
    <div class="card">
      <div class="input-row">
        <input
          id="urlInput"
          class="url-input"
          type="url"
          placeholder="https://your-very-long-url.com/goes/here"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn" id="shortenBtn" onclick="shortenUrl()">Shorten</button>
      </div>

      <p class="error-msg" id="errorMsg"></p>

      <div class="result" id="result">
        <div class="result-label">your short link</div>
        <div class="result-row">
          <a class="result-url" id="resultUrl" href="#" target="_blank"></a>
          <button class="copy-btn" id="copyBtn" onclick="copyUrl()">copy</button>
        </div>
      </div>
    </div>

    <!-- stats section -->
    <div class="stats-section">
      <button class="stats-toggle" onclick="toggleStats()">
        ↓ &nbsp;check link stats
      </button>

      <div class="stats-card" id="statsCard">
        <div class="stats-input-row">
          <input
            id="statsInput"
            class="url-input"
            type="text"
            placeholder="enter short code (e.g. aB3xZ9)"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="btn" onclick="checkStats()">Check</button>
        </div>

        <div class="stats-result" id="statsResult">
          <div class="stat-grid">
            <div class="stat-box">
              <div class="stat-box-label">total clicks</div>
              <div class="stat-box-value" id="statClicks">—</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-label">created</div>
              <div class="stat-box-value small" id="statCreated">—</div>
            </div>
            <div class="stat-box" style="grid-column: span 2;">
              <div class="stat-box-label">original url</div>
              <div class="stat-box-value small" id="statUrl">—</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <footer>
    <span>built with flask · supabase · upstash · railway</span>
    <span>12-factor app</span>
  </footer>

</div>

<script>
  // Auto-detect the base URL so it works both locally and on Railway
  const BASE = window.location.origin;

  async function shortenUrl() {
    const input = document.getElementById('urlInput');
    const btn = document.getElementById('shortenBtn');
    const errorMsg = document.getElementById('errorMsg');
    const result = document.getElementById('result');
    const resultUrl = document.getElementById('resultUrl');

    const url = input.value.trim();

    // reset state
    errorMsg.classList.remove('visible');
    result.classList.remove('visible');

    if (!url) {
      showError('Please enter a URL.');
      return;
    }

    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      showError('URL must start with http:// or https://');
      return;
    }

    // loading state
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
      const res = await fetch(`${BASE}/shorten`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Something went wrong.');
        return;
      }

      resultUrl.href = data.short_url;
      resultUrl.textContent = data.short_url;
      result.classList.add('visible');
      input.value = '';

    } catch (err) {
      showError('Could not reach the server. Please try again.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Shorten';
    }
  }

  function showError(msg) {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
  }

  async function copyUrl() {
    const resultUrl = document.getElementById('resultUrl');
    const copyBtn = document.getElementById('copyBtn');
    try {
      await navigator.clipboard.writeText(resultUrl.href);
      copyBtn.textContent = 'copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'copy';
        copyBtn.classList.remove('copied');
      }, 2000);
    } catch {
      copyBtn.textContent = 'failed';
    }
  }

  function toggleStats() {
    const card = document.getElementById('statsCard');
    const btn = document.querySelector('.stats-toggle');
    const isOpen = card.classList.toggle('visible');
    btn.textContent = isOpen ? '↑   hide stats' : '↓   check link stats';
  }

  async function checkStats() {
    const input = document.getElementById('statsInput');
    const statsResult = document.getElementById('statsResult');
    const short_code = input.value.trim();

    if (!short_code) return;

    statsResult.classList.remove('visible');

    try {
      const res = await fetch(`${BASE}/stats/${short_code}`);
      const data = await res.json();

      if (!res.ok) {
        alert(data.error || 'Short code not found.');
        return;
      }

      document.getElementById('statClicks').textContent = data.click_count;
      document.getElementById('statCreated').textContent =
        new Date(data.created_at).toLocaleDateString('en-GB', {
          day: 'numeric', month: 'short', year: 'numeric'
        });
      document.getElementById('statUrl').textContent = data.long_url;

      statsResult.classList.add('visible');

    } catch {
      alert('Could not reach the server.');
    }
  }

  // Allow pressing Enter to shorten
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') shortenUrl();
  });

  document.getElementById('statsInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkStats();
  });
</script>
</body>
</html>
